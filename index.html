<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海外便利グッズ メールダッシュボード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Hiragino Sans", sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      padding: 48px 56px;
      text-align: center;
      max-width: 520px;
      width: 90%;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 {
      font-size: 22px;
      color: #1a2e4a;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    p {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      text-decoration: none;
      padding: 16px 40px;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(37,99,235,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37,99,235,0.5);
    }
    .stats {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 32px;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 28px; font-weight: 700; color: #2563eb; }
    .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📧</div>
    <h1>海外便利グッズ<br>一括メール送信ダッシュボード</h1>
    <p>日本未上陸の海外ブランドへ、Gmailで一括コンタクト送信</p>
    <a class="btn" href="mail_dashboard.html">ダッシュボードを開く →</a>
    <div class="stats">
      <div class="stat">
        <div class="stat-num">1,105</div>
        <div class="stat-label">総商品数</div>
      </div>
      <div class="stat">
        <div class="stat-num">673</div>
        <div class="stat-label">メールアドレスあり</div>
      </div>
      <div class="stat">
        <div class="stat-num">10</div>
        <div class="stat-label">カテゴリ</div>
      </div>
    </div>
  </div>
</body>
</html>
